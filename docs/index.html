<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Claude Code Monitor</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:          #060c1a;
      --surface:     #0c1628;
      --surface-2:   #111e35;
      --border:      rgba(79,142,240,0.12);
      --border-2:    rgba(255,255,255,0.06);
      --accent:      #e5724a;
      --accent-dim:  rgba(229,114,74,0.12);
      --blue:        #4f8ef0;
      --blue-dim:    rgba(79,142,240,0.12);
      --green:       #22c55e;
      --amber:       #f59e0b;
      --teal:        #14b8a6;
      --red:         #f87171;
      --text:        #f0f4ff;
      --text-2:      #7e9abd;
      --text-3:      #3d5470;
      --r:           12px;
      --r-lg:        16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Auth Gate ─────────────────────────────── */
    #auth-gate {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 44px 40px 36px;
      width: 360px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    .auth-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent) 0%, #b84c28 100%);
      border-radius: 16px;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 24px rgba(229,114,74,0.3);
    }
    .auth-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
    .auth-sub   { font-size: 13px; color: var(--text-2); margin-bottom: 28px; }
    .auth-btn {
      width: 100%;
      background: #24292e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: white; font-size: 14px; font-weight: 600;
      padding: 12px 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, transform 0.1s;
    }
    .auth-btn:hover  { background: #2f363d; }
    .auth-btn:active { transform: scale(0.98); }
    .auth-note { font-size: 11px; color: var(--text-3); margin-top: 14px; }

    /* ── Layout ─────────────────────────────────── */
    #app { display: none; }

    .header {
      background: rgba(12,22,40,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-2);
      padding: 0 28px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left  { display: flex; align-items: center; gap: 10px; }
    .header-logo  {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, var(--accent), #b84c28);
      border-radius: 7px;
    }
    .header-title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      letter-spacing: 0.02em;
    }
    .badge-plan  { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(229,114,74,0.25); }
    .badge-sync  { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-2); }
    .badge-live  { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }

    .main { padding: 20px 28px 40px; max-width: 1380px; margin: 0 auto; }

    /* ── Budget Hero ────────────────────────────── */
    .budget-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 24px 28px;
      margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .budget-hero::after {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 280px; height: 100%;
      background: radial-gradient(ellipse at right center, rgba(229,114,74,0.08), transparent 70%);
      pointer-events: none;
    }
    .budget-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 14px;
    }
    .budget-label  { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .budget-amount { font-size: 34px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
    .budget-amount span { font-size: 15px; color: var(--text-2); font-weight: 400; margin-left: 4px; }
    .budget-pct        { text-align: right; }
    .budget-pct strong { font-size: 28px; font-weight: 800; display: block; letter-spacing: -0.03em; }
    .budget-pct small  { font-size: 12px; color: var(--text-2); }
    .progress-track {
      height: 6px; background: var(--surface-2);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), #c05a30);
      transition: width 1.2s cubic-bezier(0.16,1,0.3,1);
    }
    .progress-fill.warn   { background: linear-gradient(90deg, var(--amber), #d97706); }
    .progress-fill.danger { background: linear-gradient(90deg, var(--red), #dc2626); }
    .budget-meta { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 20px; }
    .budget-meta-item { font-size: 12px; color: var(--text-3); }
    .budget-meta-item span { color: var(--text-2); font-weight: 500; }

    /* ── Stats Grid ─────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      padding: 18px 20px;
      position: relative; overflow: hidden;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(79,142,240,0.25); }
    .stat-card.active {
      border-color: rgba(79,142,240,0.3);
      background: linear-gradient(135deg, var(--surface) 60%, rgba(79,142,240,0.04));
    }
    .stat-label {
      font-size: 11px; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 10px;
    }
    .stat-value {
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.03em; line-height: 1;
      margin-bottom: 6px;
    }
    .stat-sub   { font-size: 12px; color: var(--text-2); }
    .stat-icon  { position: absolute; top: 16px; right: 16px; font-size: 18px; opacity: 0.35; }
    .stat-detail { font-size: 11px; color: var(--text-3); margin-top: 6px; }

    /* ── Card base ──────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      padding: 20px;
    }
    .card-title { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 3px; }
    .card-sub   { font-size: 11px; color: var(--text-3); margin-bottom: 16px; }

    /* ── Line Chart ─────────────────────────────── */
    .chart-wrap { position: relative; height: 170px; }

    /* ── Bottom grid ────────────────────────────── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    /* ── Model list ─────────────────────────────── */
    .model-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border-2);
    }
    .model-item:last-child { border-bottom: none; }
    .model-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .model-info { flex: 1; min-width: 0; }
    .model-name { font-size: 13px; font-weight: 600; }
    .model-tok  { font-size: 11px; color: var(--text-3); }
    .model-bar-wrap { width: 80px; height: 4px; background: var(--surface-2); border-radius: 2px; }
    .model-bar  { height: 100%; border-radius: 2px; }
    .model-cost { font-size: 13px; font-weight: 700; width: 60px; text-align: right; }

    /* ── Project bars ───────────────────────────── */
    .proj-item { margin-bottom: 11px; }
    .proj-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .proj-name   { font-size: 12px; font-weight: 600; color: var(--text); max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .proj-meta   { font-size: 11px; color: var(--text-3); }
    .proj-track  { height: 5px; background: var(--surface-2); border-radius: 3px; }
    .proj-fill   { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--blue), #6aa3ff); }

    /* ── Sessions table ─────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-3); font-weight: 600;
      padding: 0 10px 10px; text-align: left;
    }
    tbody td {
      font-size: 12px; padding: 9px 10px;
      border-top: 1px solid var(--border-2);
      vertical-align: middle;
    }
    tbody tr:hover td { background: rgba(255,255,255,0.015); }
    .chip {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px; letter-spacing: 0.02em;
    }
    .chip-sonnet { background: var(--accent-dim);              color: var(--accent); }
    .chip-opus   { background: rgba(245,158,11,0.12);          color: var(--amber);  }
    .chip-haiku  { background: rgba(20,184,166,0.12);          color: var(--teal);   }
    .chip-other  { background: rgba(148,163,184,0.1);          color: var(--text-2); }

    /* ── Animations ─────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .fade-up { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.10s; }
    .delay-3 { animation-delay: 0.15s; }

    /* ── Empty / error ──────────────────────────── */
    .empty { text-align: center; padding: 60px 0; color: var(--text-2); }
    .empty h3 { font-size: 16px; margin-bottom: 8px; }
    .empty p  { font-size: 13px; color: var(--text-3); }
    code { background: var(--surface-2); padding: 2px 7px; border-radius: 5px; font-family: monospace; }

    /* ── AI Insights ────────────────────────────── */
    .insights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }
    .insight-item {
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .insight-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .insight-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .insight-body  { font-size: 12px; color: var(--text-2); line-height: 1.55; }
    .insight-item.warning { border-color: rgba(248,113,113,0.25); background: rgba(248,113,113,0.04); }
    .insight-item.tip     { border-color: rgba(34,197,94,0.2);    background: rgba(34,197,94,0.03);   }

    .recs-list { display: flex; flex-direction: column; gap: 8px; }
    .rec-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 14px;
      background: var(--surface-2);
      border-radius: 8px;
      border-left: 3px solid;
    }
    .rec-item.high   { border-left-color: var(--red);   }
    .rec-item.medium { border-left-color: var(--amber);  }
    .rec-item.low    { border-left-color: var(--blue);   }
    .rec-title  { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .rec-detail { font-size: 12px; color: var(--text-2); }
    .rec-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 4px; flex-shrink: 0; margin-top: 2px; letter-spacing: 0.04em;
    }
    .rec-badge.high   { background: rgba(248,113,113,0.15); color: var(--red);   }
    .rec-badge.medium { background: rgba(245,158,11,0.15);  color: var(--amber); }
    .rec-badge.low    { background: var(--blue-dim);         color: var(--blue);  }

    .score-ring {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 0; border-bottom: 1px solid var(--border-2); margin-bottom: 14px;
    }
    .score-num { font-size: 40px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
    .score-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
    .score-reason { font-size: 12px; color: var(--text-2); }
    .ai-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
      background: rgba(79,142,240,0.1); color: var(--blue);
      border: 1px solid rgba(79,142,240,0.2);
      padding: 2px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle;
    }
    .insights-loading { color: var(--text-3); font-size: 12px; padding: 20px 0; text-align: center; }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 960px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col    { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .stats-grid { grid-template-columns: 1fr; }
      .main { padding: 12px 14px 32px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════ AUTH GATE ══════════════════════ -->
<div id="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">🤖</div>
    <div class="auth-title">Claude Code Monitor</div>
    <div class="auth-sub">개인 사용량 대시보드 — GitHub 계정으로 로그인</div>
    <button class="auth-btn" onclick="netlifyIdentity.open()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      GitHub 로 로그인
    </button>
    <div class="auth-note">초대된 계정만 접근할 수 있습니다</div>
  </div>
</div>

<!-- ══════════════════════ MAIN APP ═══════════════════════ -->
<div id="app">
  <nav class="header">
    <div class="header-left">
      <div class="header-logo"></div>
      <span class="header-title">Claude Code Monitor</span>
    </div>
    <div class="header-right">
      <span class="badge badge-live">● LIVE</span>
      <span class="badge badge-plan" id="plan-badge">Max 5x</span>
      <span class="badge badge-sync" id="sync-badge">불러오는 중…</span>
    </div>
  </nav>

  <div class="main" id="main-content">
    <div class="empty"><p>데이터 불러오는 중…</p></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
//  1) node scripts/hash-password.js  을 실행해서 비밀번호 설정
//  2) CLAUDE_PLAN 을 실제 플랜으로 변경: pro | max_5x | max_20x
// ═══════════════════════════════════════════════════════════
const CONFIG = {
  passwordHash: '5e86bac63615ade8274c95d7b5ddf021342db83d377a24830fbfbb88e2ba2274',   // ← 비밀번호 해시 (자동 교체됨)
  skipAuthInDev: true,                           // CHANGE_ME 상태일 때 로컬 테스트용 스킵
};

// ─── Auth ──────────────────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function handleAuth() {
  const val = document.getElementById('auth-input').value;
  if (!val) return;

  if (CONFIG.passwordHash === 'CHANGE_ME_RUN_HASH_SCRIPT' && CONFIG.skipAuthInDev) {
    return unlock();
  }

  const hash = await sha256(val);
  if (hash === CONFIG.passwordHash) {
    sessionStorage.setItem('cc_auth', hash);
    unlock();
  } else {
    const card = document.getElementById('auth-card');
    const err  = document.getElementById('auth-error');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    err.style.display = 'block';
    document.getElementById('auth-input').value = '';
  }
}

document.getElementById('auth-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleAuth();
});

function unlock() {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadDashboard();
}

// Auto-unlock if session still valid
(async () => {
  if (CONFIG.passwordHash === 'CHANGE_ME_RUN_HASH_SCRIPT' && CONFIG.skipAuthInDev) {
    return unlock();
  }
  const stored = sessionStorage.getItem('cc_auth');
  if (stored && stored === CONFIG.passwordHash) unlock();
})();

// ─── Helpers ──────────────────────────────────────────────
const PLAN_LABELS = { pro: 'Claude Pro ($20)', max_5x: 'Max 5x ($100)', max_20x: 'Max 20x ($200)' };

const MODEL_DISPLAY = {
  'claude-opus-4-7':           'Opus 4.7',
  'claude-opus-4-6':           'Opus 4.6',
  'claude-sonnet-4-6':         'Sonnet 4.6',
  'claude-sonnet-4-5':         'Sonnet 4.5',
  'claude-haiku-4-5-20251001': 'Haiku 4.5',
  'claude-haiku-4-5':          'Haiku 4.5',
};

function modelLabel(m) {
  return MODEL_DISPLAY[m] || m.replace('claude-','').replace(/-\d{8}$/,'');
}
function modelColor(m) {
  if (m.includes('opus'))   return '#f59e0b';
  if (m.includes('sonnet')) return '#e5724a';
  if (m.includes('haiku'))  return '#14b8a6';
  return '#64748b';
}
function chipClass(m) {
  if (m.includes('opus'))   return 'chip-opus';
  if (m.includes('sonnet')) return 'chip-sonnet';
  if (m.includes('haiku'))  return 'chip-haiku';
  return 'chip-other';
}
function $c(v)   { return `$${v.toFixed(v < 0.01 ? 4 : 2)}`; }
function $k(n)   { return n >= 1e6 ? `${(n/1e6).toFixed(1)}M` : n >= 1e3 ? `${(n/1e3).toFixed(0)}K` : String(n); }
function $dt(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) + ' '
       + d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}
function $dur(s,e) {
  if (!s||!e) return '—';
  const m = Math.round((new Date(e)-new Date(s))/60000);
  return m < 60 ? `${m}분` : `${Math.floor(m/60)}h ${m%60}m`;
}
function $ago(iso) {
  const m = Math.round((Date.now()-new Date(iso))/60000);
  if (m < 1)  return '방금';
  if (m < 60) return `${m}분 전`;
  const h = Math.round(m/60);
  if (h < 24) return `${h}시간 전`;
  return `${Math.round(h/24)}일 전`;
}

// ─── Dashboard ────────────────────────────────────────────
async function loadDashboard() {
  try {
    const r = await fetch('./data.json?t=' + Date.now());
    if (!r.ok) throw new Error('not found');
    renderDashboard(await r.json());
  } catch {
    document.getElementById('main-content').innerHTML = `
      <div class="empty">
        <h3>⚠️ data.json을 찾을 수 없습니다</h3>
        <p>먼저 <code>node scripts/parse-usage.js</code> 를 실행하고<br>
           생성된 <code>docs/data.json</code> 을 커밋·푸시하세요.</p>
      </div>`;
  }
}

function renderDashboard(d) {
  const { meta, current_session: cs, summary: s, daily, by_model, by_project, recent_sessions } = d;
  const budget  = meta.monthly_budget || 100;
  const mCost   = s.this_month.cost_usd;
  const pct     = Math.min(100, (mCost / budget) * 100);
  const fillCls = pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : '';

  document.getElementById('plan-badge').textContent = PLAN_LABELS[meta.plan] || meta.plan;
  document.getElementById('sync-badge').textContent  = $ago(meta.generated_at);

  document.getElementById('main-content').innerHTML = `

    <!-- Budget Hero -->
    <div class="budget-hero fade-up">
      <div class="budget-top">
        <div>
          <div class="budget-label">이번 달 추정 API 사용액 <span style="font-size:10px;color:var(--text-3);letter-spacing:0">(구독 플랜 = 토큰 기준 환산)</span></div>
          <div class="budget-amount">${$c(mCost)}<span>/ ${$c(budget)}</span></div>
        </div>
        <div class="budget-pct">
          <strong style="color:${pct>=90?'var(--red)':pct>=70?'var(--amber)':'var(--text)'}">${pct.toFixed(1)}%</strong>
          <small>사용됨</small>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${fillCls}" id="prog" style="width:0%"></div>
      </div>
      <div class="budget-meta">
        <div class="budget-meta-item">입력 <span>${$k(s.this_month.input_tokens)} tok</span></div>
        <div class="budget-meta-item">출력 <span>${$k(s.this_month.output_tokens)} tok</span></div>
        <div class="budget-meta-item">세션 <span>${s.this_month.sessions}개</span></div>
        <div class="budget-meta-item">대화 <span>${s.this_month.messages}회</span></div>
        <div class="budget-meta-item">남은 예산 <span style="color:${pct>=90?'var(--red)':'var(--green)'}">${$c(Math.max(0, budget - mCost))}</span></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid fade-up delay-1">
      ${statCard('현재 세션', cs
        ? { v: $c(cs.cost_usd), sub: `${cs.messages}회 대화 · ${$dur(cs.start,cs.end)}`, detail: cs.project, icon:'⚡' }
        : { v: '—', sub: '활성 세션 없음', detail: '', icon:'⚡' }, true)}
      ${statCard('오늘',      { v: $c(s.today.cost_usd),      sub: `${s.today.messages}회 · ${s.today.sessions}세션`,      icon:'📅' })}
      ${statCard('이번 주',   { v: $c(s.this_week.cost_usd),  sub: `${s.this_week.messages}회 · ${s.this_week.sessions}세션`, icon:'📆' })}
      ${statCard('전체 누적', { v: $c(s.all_time.cost_usd),   sub: `총 ${s.all_time.messages}회 대화`,
        detail: `${s.all_time.sessions}개 세션`, icon:'∑' })}
    </div>

    <!-- Line chart -->
    <div class="card fade-up delay-2" style="margin-bottom:12px">
      <div class="card-title">일별 사용 비용 (최근 30일)</div>
      <div class="card-sub">하루에 얼마나 썼는지 한눈에 확인하세요</div>
      <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
    </div>

    <!-- Model + Project -->
    <div class="two-col fade-up delay-3">
      <div class="card">
        <div class="card-title">모델별 사용량</div>
        <div class="card-sub">어떤 Claude 모델을 주로 쓰나요?</div>
        ${renderModels(by_model)}
      </div>
      <div class="card">
        <div class="card-title">프로젝트별 사용량</div>
        <div class="card-sub">어느 작업에 가장 많이 투자했나요?</div>
        ${renderProjects(by_project)}
      </div>
    </div>

    <!-- AI Insights -->
    <div class="card fade-up delay-3" style="margin-bottom:12px" id="insights-card">
      <div class="card-title">
        AI 인사이트
        <span class="ai-badge">🤖 Claude 분석</span>
      </div>
      <div class="card-sub">Claude가 사용 패턴을 분석하고 개선안을 제안합니다 — <code style="font-size:10px">node scripts/generate-insights.js</code> 로 업데이트</div>
      <div id="insights-content"><div class="insights-loading">인사이트 불러오는 중…</div></div>
    </div>

    <!-- Sessions table -->
    <div class="card fade-up delay-3">
      <div class="card-title">최근 세션 기록</div>
      <div class="card-sub">최근 작업 내역을 세션 단위로 확인하세요</div>
      ${renderTable(recent_sessions)}
    </div>
  `;

  // Animate progress bar
  requestAnimationFrame(() => {
    setTimeout(() => {
      const el = document.getElementById('prog');
      if (el) el.style.width = pct + '%';
    }, 200);
  });

  renderLineChart(daily);
  loadInsights();
}

function statCard(label, { v, sub, detail, icon }, active = false) {
  return `
    <div class="stat-card${active ? ' active' : ''}">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${v}</div>
      <div class="stat-sub">${sub}</div>
      ${detail ? `<div class="stat-detail">${detail}</div>` : ''}
    </div>`;
}

function renderModels(models) {
  if (!models.length) return '<p style="color:var(--text-3);font-size:12px">데이터 없음</p>';
  const max = models[0].cost_usd || 1;
  return models.map(m => `
    <div class="model-item">
      <div class="model-dot" style="background:${modelColor(m.model)}"></div>
      <div class="model-info">
        <div class="model-name">${modelLabel(m.model)}</div>
        <div class="model-tok">${$k(m.input_tokens + m.output_tokens)} tok · ${m.sessions}세션</div>
      </div>
      <div class="model-bar-wrap">
        <div class="model-bar" style="width:${(m.cost_usd/max*100).toFixed(0)}%;background:${modelColor(m.model)}"></div>
      </div>
      <div class="model-cost">${$c(m.cost_usd)}</div>
    </div>`).join('');
}

function renderProjects(projects) {
  if (!projects.length) return '<p style="color:var(--text-3);font-size:12px">데이터 없음</p>';
  const max = projects[0].cost_usd || 1;
  return projects.slice(0, 8).map(p => `
    <div class="proj-item">
      <div class="proj-header">
        <span class="proj-name">${p.project}</span>
        <span class="proj-meta">${$c(p.cost_usd)} · ${p.sessions}세션</span>
      </div>
      <div class="proj-track">
        <div class="proj-fill" style="width:${(p.cost_usd/max*100).toFixed(0)}%"></div>
      </div>
    </div>`).join('');
}

function renderTable(sessions) {
  if (!sessions.length) return '<p style="color:var(--text-3);font-size:12px">세션 없음</p>';
  return `<table>
    <thead><tr>
      <th>시작</th><th>프로젝트</th><th>모델</th>
      <th>대화</th><th>소요</th><th style="text-align:right">비용</th>
    </tr></thead>
    <tbody>${sessions.map(s => `
      <tr>
        <td style="color:var(--text-2)">${$dt(s.start)}</td>
        <td style="font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.project}</td>
        <td><span class="chip ${chipClass(s.model)}">${modelLabel(s.model)}</span></td>
        <td style="color:var(--text-2)">${s.messages}</td>
        <td style="color:var(--text-2)">${$dur(s.start,s.end)}</td>
        <td style="text-align:right;font-weight:700">${$c(s.cost_usd)}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ─── AI Insights ──────────────────────────────────────────
async function loadInsights() {
  const el = document.getElementById('insights-content');
  if (!el) return;
  try {
    const r = await fetch('./insights.json?t=' + Date.now());
    if (!r.ok) throw new Error('not found');
    renderInsights(await r.json());
  } catch {
    el.innerHTML = `<div class="insights-loading">
      인사이트 없음 — <code>node scripts/generate-insights.js</code> 실행 후 <code>insights.json</code>을 푸시하세요
    </div>`;
  }
}

function renderInsights(ins) {
  const el = document.getElementById('insights-content');
  if (!el) return;

  const scoreColor = ins.efficiency_score >= 75 ? 'var(--green)'
    : ins.efficiency_score >= 50 ? 'var(--amber)' : 'var(--red)';

  const budgetBadge = ins.budget_status === 'good'    ? `<span style="color:var(--green);font-size:12px">✔ 예산 양호</span>`
    : ins.budget_status === 'caution'  ? `<span style="color:var(--amber);font-size:12px">⚠ 주의</span>`
    : `<span style="color:var(--red);font-size:12px">🔴 예산 경고</span>`;

  const insightCards = (ins.insights || []).map(i => `
    <div class="insight-item ${i.type === 'warning' ? 'warning' : i.type === 'tip' ? 'tip' : ''}">
      <div class="insight-icon">${i.icon || '💡'}</div>
      <div>
        <div class="insight-title">${i.title}</div>
        <div class="insight-body">${i.body}</div>
      </div>
    </div>`).join('');

  const recItems = (ins.recommendations || []).map(r => `
    <div class="rec-item ${r.priority}">
      <div style="flex:1">
        <div class="rec-title">${r.title}</div>
        <div class="rec-detail">${r.detail}</div>
      </div>
      <span class="rec-badge ${r.priority}">${r.priority === 'high' ? '긴급' : r.priority === 'medium' ? '권장' : '참고'}</span>
    </div>`).join('');

  el.innerHTML = `
    <div class="score-ring">
      <div>
        <div class="score-num" style="color:${scoreColor}">${ins.efficiency_score}</div>
        <div class="score-label">효율 점수 / 100</div>
      </div>
      <div>
        <div style="font-size:15px;font-weight:700;margin-bottom:4px">${ins.headline} ${budgetBadge}</div>
        <div class="score-reason">${ins.efficiency_reason}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:4px">분석: ${new Date(ins.generated_at).toLocaleString('ko-KR')}</div>
      </div>
    </div>
    <div class="insights-grid">${insightCards}</div>
    ${recItems ? `<div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.07em;margin:14px 0 8px">개선 권장사항</div>
    <div class="recs-list">${recItems}</div>` : ''}
  `;
}

function renderLineChart(daily) {
  const ctx = document.getElementById('lineChart');
  if (!ctx) return;
  const labels = daily.map(d => {
    const dt = new Date(d.date);
    return `${dt.getMonth()+1}/${dt.getDate()}`;
  });
  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '일별 비용 ($)',
        data: daily.map(d => d.cost_usd),
        borderColor: '#e5724a',
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 170);
          g.addColorStop(0, 'rgba(229,114,74,0.18)');
          g.addColorStop(1, 'rgba(229,114,74,0)');
          return g;
        },
        borderWidth: 2,
        pointRadius: 3,
        pointHoverRadius: 6,
        pointBackgroundColor: '#e5724a',
        pointBorderColor: 'transparent',
        fill: true,
        tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0c1628',
          borderColor: 'rgba(79,142,240,0.25)',
          borderWidth: 1,
          titleColor: '#7e9abd',
          bodyColor: '#f0f4ff',
          callbacks: {
            label: c => `  ${c.parsed.y === 0 ? '$0.00' : '$' + c.parsed.y.toFixed(4)}`
          }
        }
      },
      scales: {
        x: {
          grid:   { color: 'rgba(255,255,255,0.04)' },
          ticks:  { color: '#3d5470', font: { size: 10 }, maxTicksLimit: 10 },
          border: { color: 'rgba(255,255,255,0.06)' },
        },
        y: {
          grid:   { color: 'rgba(255,255,255,0.04)' },
          ticks:  { color: '#3d5470', font: { size: 10 }, callback: v => `$${v.toFixed(2)}` },
          border: { color: 'rgba(255,255,255,0.06)' },
          beginAtZero: true,
        }
      }
    }
  });
}
</script>
</body>
</html>
